name: Graphify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the minimum supported version from pyproject.toml (requires-python = ">=3.10").
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check shared Graphify artifacts
        run: |
          python scripts/graphify_maintenance.py status
          python scripts/graphify_maintenance.py check-stale
          test -f graphify-out/GRAPH_REPORT.md
