<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nailed It</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #fff; color: #111; display: flex; flex-direction: column; align-items: center; padding: 48px 24px; gap: 48px; }
    h1 { font-size: 1.5rem; font-weight: 600; }
    h2 { font-size: 1.15rem; font-weight: 600; }
    section { display: flex; flex-direction: column; align-items: center; gap: 24px; width: 100%; max-width: 900px; }
    hr.divider { width: 100%; max-width: 900px; border: none; border-top: 1.5px solid #eee; }

    /* upload cards */
    .uploads { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .upload-card { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .upload-card label { font-size: 0.85rem; color: #555; }
    .preview { width: 220px; height: 220px; border: 1.5px dashed #ccc; border-radius: 8px; object-fit: cover; background: #f9f9f9; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 0.8rem; overflow: hidden; }
    .preview img { width: 100%; height: 100%; object-fit: cover; }
    input[type="file"] { display: none; }
    .btn-upload { padding: 8px 18px; border: 1.5px solid #111; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.85rem; }
    .btn-upload:hover { background: #f0f0f0; }

    /* primary buttons */
    .btn-primary { padding: 12px 36px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .btn-primary:hover:not(:disabled) { background: #333; }
    .btn-primary:disabled { background: #999; cursor: not-allowed; }

    .status { font-size: 0.85rem; color: #666; min-height: 1.2em; }

    /* try-on output */
    #tryon-output { display: none; flex-direction: column; align-items: center; gap: 12px; }
    #tryon-output p { font-size: 0.85rem; color: #555; }
    #result-img { max-width: 480px; border-radius: 10px; box-shadow: 0 2px 16px rgba(0,0,0,0.12); }

    /* multi-upload thumbnails */
    #thumb-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .thumb-wrapper { position: relative; display: inline-block; }
    .thumb { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; border: 1.5px solid #ddd; display: block; }
    .thumb-remove { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; border: none; background: #111; color: #fff; cursor: pointer; font-size: 12px; line-height: 18px; padding: 0; text-align: center; }

    /* breakdown table */
    #breakdown-output { display: none; flex-direction: column; gap: 16px; width: 100%; }
    #styles-container { display: flex; flex-direction: column; gap: 0; width: 100%; }
    .style-heading { font-size: 0.95rem; font-weight: 600; color: #333; margin-bottom: 8px; }
    hr.style-divider { width: 100%; border: none; border-top: 1px dashed #ddd; margin: 16px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { background: #f5f5f5; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
    td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr.subtotals-row td { font-weight: 500; background: #f5f5f5; border-top: 1.5px solid #eee; color: #555; font-size: 0.85rem; }
    tr.totals-row td { font-weight: 600; background: #fafafa; border-top: 2px solid #ddd; }
    input.qty-input, input.price-input { width: 70px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.875rem; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 500; }
    .text-zh { display: block; font-size: 0.75rem; color: #999; margin-top: 2px; }
    .badge-length { background: #e0f0ff; color: #1a6fa8; }
    .badge-shape  { background: #fce8ff; color: #8b2fa8; }
    .badge-color  { background: #fff3e0; color: #a05c00; }
    .badge-style  { background: #e8f5e9; color: #2e7d32; }
    #breakdown-notes { font-size: 0.85rem; color: #555; font-style: italic; }

    /* trending section */
    #trending-section { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .trending-header { display: flex; align-items: center; gap: 16px; }
    .trending-header h2 { margin: 0; }
    .btn-refresh { padding: 6px 14px; border: 1.5px solid #111; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8rem; }
    .btn-refresh:hover:not(:disabled) { background: #f0f0f0; }
    .btn-refresh:disabled { border-color: #ccc; color: #999; cursor: not-allowed; }
    #trending-status { font-size: 0.85rem; color: #666; min-height: 1.2em; }
    #trending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; width: 100%; }
    .trend-card { border: 1.5px solid #eee; border-radius: 10px; padding: 14px 14px 12px; display: flex; flex-direction: column; gap: 6px; background: #fff; }
    .trend-rank { font-size: 1.1rem; font-weight: 700; color: #111; }
    .trend-name { font-size: 0.9rem; font-weight: 600; line-height: 1.3; }
    .trend-name-zh { font-size: 0.78rem; color: #888; margin-top: -2px; }
    .trend-desc { font-size: 0.78rem; color: #555; line-height: 1.4; flex: 1; }
    .trend-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .trend-tag { padding: 2px 7px; border-radius: 10px; font-size: 0.7rem; background: #f0f0f0; color: #444; }
    .trend-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
    .trend-link { padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; background: #f7f7f7; color: #1a6fa8; text-decoration: none; border: 1px solid #e5e5e5; }
    .trend-link:hover { background: #eef4fb; border-color: #c9d9e8; }
    .skeleton-card { border: 1.5px solid #eee; border-radius: 10px; padding: 14px; background: #fafafa; height: 140px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  </style>
</head>
<body>
  <h1>Nailed It</h1>

  <!-- ── Trending Now ── -->
  <section id="trending-section">
    <div class="trending-header">
      <h2>Trending Now / 热门款式</h2>
      <button class="btn-refresh" id="trending-refresh" disabled>Refresh</button>
    </div>
    <p id="trending-status" class="status">Loading…</p>
    <div id="trending-grid"></div>
  </section>

  <hr class="divider" />
  <section>
    <h2>Virtual Try-On</h2>
    <div class="uploads">
      <div class="upload-card">
        <label>Hand photo</label>
        <div class="preview" id="hand-preview">no image</div>
        <label class="btn-upload" for="hand-input">Choose file</label>
        <input type="file" id="hand-input" accept="image/jpeg,image/png" />
      </div>
      <div class="upload-card">
        <label>Nail style</label>
        <div class="preview" id="style-preview">no image</div>
        <label class="btn-upload" for="style-input">Choose file</label>
        <input type="file" id="style-input" accept="image/jpeg,image/png" />
      </div>
    </div>
    <button id="generate" class="btn-primary" disabled>Generate</button>
    <p id="tryon-status" class="status"></p>
    <div id="tryon-output">
      <p>Result</p>
      <img id="result-img" alt="Try-on result" />
    </div>
  </section>

  <hr class="divider" />

  <!-- ── Component Breakdown ── -->
  <section>
    <h2>Component Breakdown</h2>
    <div class="upload-card">
      <label>Upload one or more nail style images</label>
      <label class="btn-upload" for="breakdown-input">Choose files</label>
      <input type="file" id="breakdown-input" accept="image/jpeg,image/png" multiple />
    </div>
    <div id="thumb-row"></div>
    <label style="font-size:0.85rem; display:flex; align-items:center; gap:8px; cursor:pointer;">
      <input type="checkbox" id="free-mode" />
      Free mode — let the AI identify components freely (no predefined categories)
    </label>
    <button id="analyse" class="btn-primary" disabled>Analyse Components</button>
    <p id="breakdown-status" class="status"></p>
    <div id="breakdown-output">
      <div id="styles-container"></div>
      <table>
        <tfoot>
          <tr class="totals-row">
            <td colspan="5">Grand Total</td>
            <td id="total-price">—</td>
            <td id="total-time">—</td>
          </tr>
        </tfoot>
      </table>
      <p id="breakdown-notes"></p>
    </div>
  </section>

  <script>
    // ── Try-On ──────────────────────────────────────────────────────────
    const handInput    = document.getElementById('hand-input');
    const styleInput   = document.getElementById('style-input');
    const generateBtn  = document.getElementById('generate');
    const tryonStatus  = document.getElementById('tryon-status');
    const tryonOutput  = document.getElementById('tryon-output');
    const resultImg    = document.getElementById('result-img');

    function setPreview(inputEl, previewId) {
      const file = inputEl.files[0];
      if (!file) return;
      const div = document.getElementById(previewId);
      const existing = div.querySelector('img');
      if (existing) URL.revokeObjectURL(existing.src);
      div.innerHTML = '';
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      div.appendChild(img);
      generateBtn.disabled = !(handInput.files[0] && styleInput.files[0]);
    }

    handInput.addEventListener('change', () => setPreview(handInput, 'hand-preview'));
    styleInput.addEventListener('change', () => setPreview(styleInput, 'style-preview'));

    generateBtn.addEventListener('click', async () => {
      generateBtn.disabled = true;
      tryonOutput.style.display = 'none';
      tryonStatus.textContent = 'Generating… this may take ~20 seconds';
      const form = new FormData();
      form.append('hand_image', handInput.files[0]);
      form.append('nail_style_image', styleInput.files[0]);
      try {
        const res = await fetch('/api/v1/try-on', { method: 'POST', body: form });
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${res.status}`); }
        const data = await res.json();
        resultImg.src = `data:${data.mime_type};base64,${data.image_b64}`;
        tryonOutput.style.display = 'flex';
        tryonStatus.textContent = '';
      } catch (e) {
        tryonStatus.textContent = `Error: ${e.message}`;
      } finally {
        generateBtn.disabled = false;
      }
    });

    // ── Component Breakdown ─────────────────────────────────────────────
    const breakdownInput  = document.getElementById('breakdown-input');
    const freeModeChk     = document.getElementById('free-mode');
    const thumbRow        = document.getElementById('thumb-row');
    const analyseBtn      = document.getElementById('analyse');
    const breakdownStatus = document.getElementById('breakdown-status');
    const breakdownOutput = document.getElementById('breakdown-output');
    const stylesContainer = document.getElementById('styles-container');
    const totalPriceEl    = document.getElementById('total-price');
    const totalTimeEl     = document.getElementById('total-time');
    const notesEl         = document.getElementById('breakdown-notes');

    let breakdownFiles = [];

    function renderThumbs() {
      thumbRow.querySelectorAll('img').forEach(img => URL.revokeObjectURL(img.src));
      thumbRow.innerHTML = '';
      breakdownFiles.forEach((file, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'thumb-wrapper';
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = URL.createObjectURL(file);
        const btn = document.createElement('button');
        btn.className = 'thumb-remove';
        btn.textContent = '×';
        btn.title = 'Remove';
        btn.addEventListener('click', () => {
          URL.revokeObjectURL(img.src);
          breakdownFiles.splice(i, 1);
          renderThumbs();
        });
        wrapper.append(img, btn);
        thumbRow.appendChild(wrapper);
      });
      analyseBtn.disabled = breakdownFiles.length === 0;
    }

    breakdownInput.addEventListener('change', () => {
      const existing = new Set(breakdownFiles.map(f => `${f.name}:${f.size}`));
      Array.from(breakdownInput.files).forEach(f => {
        if (!existing.has(`${f.name}:${f.size}`)) breakdownFiles.push(f);
      });
      breakdownInput.value = '';
      renderThumbs();
    });

    function recalcTotals() {
      let grandPrice = 0, grandTime = 0;
      stylesContainer.querySelectorAll('.style-section').forEach(section => {
        let subtotalPrice = 0, subtotalTime = 0;
        section.querySelectorAll('tbody tr').forEach(row => {
          const qty       = parseFloat(row.querySelector('.qty-input').value)   || 0;
          const unitPrice = parseFloat(row.querySelector('.price-input').value) || 0;
          const time      = parseFloat(row.dataset.timePerUnit) || 0;
          const rowTotal  = qty * unitPrice;
          row.querySelector('.row-total').textContent = rowTotal.toFixed(2);
          row.querySelector('.row-time').textContent  = (qty * time).toFixed(1);
          subtotalPrice += rowTotal;
          subtotalTime  += qty * time;
        });
        section.querySelector('.style-subtotal-price').textContent = subtotalPrice.toFixed(2);
        section.querySelector('.style-subtotal-time').textContent  = subtotalTime.toFixed(1);
        grandPrice += subtotalPrice;
        grandTime  += subtotalTime;
      });
      totalPriceEl.textContent = grandPrice.toFixed(2);
      totalTimeEl.textContent  = grandTime.toFixed(1);
    }

    function buildStyleTable(style) {
      const table = document.createElement('table');

      const thead = table.createTHead();
      const hrow = thead.insertRow();
      ['Category', 'Component', 'Qty', 'Unit', 'Unit Price ($)', 'Total Price ($)', 'Time (min)'].forEach(label => {
        const th = document.createElement('th');
        th.textContent = label;
        hrow.appendChild(th);
      });

      const tbody = table.createTBody();
      style.components.forEach(c => {
        const tr = tbody.insertRow();
        tr.dataset.timePerUnit = c.time_minutes / Math.max(c.quantity, 1);

        const badge = document.createElement('span');
        badge.className = `badge badge-${c.category}`;
        badge.textContent = c.category;
        const tdCat = tr.insertCell();
        tdCat.appendChild(badge);
        if (c.category_zh) {
          const zh = document.createElement('span');
          zh.className = 'text-zh';
          zh.textContent = c.category_zh;
          tdCat.appendChild(zh);
        }

        const tdName = tr.insertCell();
        tdName.textContent = c.name;
        if (c.name_zh) {
          const zh = document.createElement('span');
          zh.className = 'text-zh';
          zh.textContent = c.name_zh;
          tdName.appendChild(zh);
        }

        const qtyInput = document.createElement('input');
        qtyInput.className = 'qty-input';
        qtyInput.type = 'number'; qtyInput.min = '0'; qtyInput.step = '0.1';
        qtyInput.value = c.quantity;
        const tdQty = tr.insertCell(); tdQty.appendChild(qtyInput);

        const tdUnit = tr.insertCell(); tdUnit.textContent = c.unit;

        const priceInput = document.createElement('input');
        priceInput.className = 'price-input';
        priceInput.type = 'number'; priceInput.min = '0'; priceInput.step = '0.01';
        priceInput.value = c.unit_price;
        const tdUnitPrice = tr.insertCell(); tdUnitPrice.appendChild(priceInput);

        const tdTotal = tr.insertCell(); tdTotal.className = 'row-total';
        tdTotal.textContent = c.total_price.toFixed(2);

        const tdTime = tr.insertCell(); tdTime.className = 'row-time';
        tdTime.textContent = c.time_minutes.toFixed(1);

        qtyInput.addEventListener('input', recalcTotals);
        priceInput.addEventListener('input', recalcTotals);
      });

      const tfoot = table.createTFoot();
      const subtotalRow = tfoot.insertRow();
      subtotalRow.className = 'subtotals-row';
      const tdLabel = subtotalRow.insertCell(); tdLabel.colSpan = 5; tdLabel.textContent = 'Subtotal';
      const tdSubPrice = subtotalRow.insertCell(); tdSubPrice.className = 'style-subtotal-price';
      tdSubPrice.textContent = style.subtotal_price.toFixed(2);
      const tdSubTime = subtotalRow.insertCell(); tdSubTime.className = 'style-subtotal-time';
      tdSubTime.textContent = style.subtotal_time_minutes.toFixed(1);

      return table;
    }

    function renderTable(data) {
      stylesContainer.innerHTML = '';
      data.styles.forEach((style, idx) => {
        if (idx > 0) {
          const hr = document.createElement('hr');
          hr.className = 'style-divider';
          stylesContainer.appendChild(hr);
        }
        const section = document.createElement('div');
        section.className = 'style-section';
        const h3 = document.createElement('h3');
        h3.className = 'style-heading';
        h3.textContent = style.style_name;
        section.append(h3, buildStyleTable(style));
        stylesContainer.appendChild(section);
      });
      totalPriceEl.textContent = data.total_price.toFixed(2);
      totalTimeEl.textContent  = data.total_time_minutes.toFixed(1);
      notesEl.textContent      = data.notes;
    }

    analyseBtn.addEventListener('click', async () => {
      analyseBtn.disabled = true;
      breakdownOutput.style.display = 'none';
      breakdownStatus.textContent = 'Analysing… this may take ~20 seconds';
      const form = new FormData();
      breakdownFiles.forEach(f => form.append('files', f));
      try {
        const res = await fetch(`/api/v1/breakdown?free_mode=${freeModeChk.checked}`, { method: 'POST', body: form });
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${res.status}`); }
        const data = await res.json();
        renderTable(data);
        breakdownOutput.style.display = 'flex';
        breakdownStatus.textContent = '';
      } catch (e) {
        breakdownStatus.textContent = `Error: ${e.message}`;
      } finally {
        analyseBtn.disabled = false;
      }
    });

    // ── Trending Now ────────────────────────────────────────────────────
    const trendingGrid    = document.getElementById('trending-grid');
    const trendingStatus  = document.getElementById('trending-status');
    const trendingRefresh = document.getElementById('trending-refresh');

    const RANK_EMOJIS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];

    function showSkeletons() {
      trendingGrid.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const el = document.createElement('div');
        el.className = 'skeleton-card';
        trendingGrid.appendChild(el);
      }
    }

    function renderTrending(data) {
      trendingGrid.innerHTML = '';
      data.styles.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'trend-card';

        const rank = document.createElement('span');
        rank.className = 'trend-rank';
        rank.textContent = RANK_EMOJIS[i] || `#${s.rank}`;

        const name = document.createElement('div');
        name.className = 'trend-name';
        name.textContent = s.name;

        const nameZh = document.createElement('div');
        nameZh.className = 'trend-name-zh';
        nameZh.textContent = s.name_zh;

        const desc = document.createElement('div');
        desc.className = 'trend-desc';
        desc.textContent = s.description;

        const tags = document.createElement('div');
        tags.className = 'trend-tags';
        s.tags.forEach(t => {
          const chip = document.createElement('span');
          chip.className = 'trend-tag';
          chip.textContent = t;
          tags.appendChild(chip);
        });

        const links = document.createElement('div');
        links.className = 'trend-links';
        (s.search_links || []).forEach(l => {
          const a = document.createElement('a');
          a.className = 'trend-link';
          a.href = l.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = l.label;
          links.appendChild(a);
        });

        card.append(rank, name, nameZh, desc, tags, links);
        trendingGrid.appendChild(card);
      });
    }

    async function loadTrending(forceRefresh = false) {
      showSkeletons();
      trendingStatus.textContent = 'Loading trending styles…';
      trendingRefresh.disabled = true;
      try {
        const url = forceRefresh ? '/api/v1/trending?refresh=true' : '/api/v1/trending';
        const res = await fetch(url);
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${res.status}`); }
        const data = await res.json();
        renderTrending(data);
        trendingStatus.textContent = '';
      } catch (e) {
        trendingGrid.innerHTML = '';
        trendingStatus.textContent = `Error: ${e.message}`;
      } finally {
        trendingRefresh.disabled = false;
      }
    }

    trendingRefresh.addEventListener('click', () => loadTrending(true));
    loadTrending();
  </script>
</body>
</html>
